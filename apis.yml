name: Ansible
description: >-
  Ansible is an open-source IT automation platform developed by Red Hat that
  provides agentless configuration management, application deployment, cloud
  provisioning, and orchestration. Using YAML-based playbooks and an
  SSH-native architecture, Ansible automates infrastructure at scale without
  requiring agents or custom security infrastructure on managed nodes.
