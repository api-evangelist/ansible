  - type: Features
    data:
      - name: Agentless Architecture
        description: >-
          Ansible connects to managed nodes via SSH or WinRM without requiring
          any agent software, simplifying deployment and reducing attack surface.
      - name: YAML Playbooks
        description: >-
          Automation is defined in human-readable YAML playbooks that describe
          the desired state of managed systems without complex programming.
      - name: Idempotent Execution
        description: >-
          Ansible tasks are idempotent — running the same playbook multiple
          times produces the same result, making deployments safe to rerun.
      - name: Module Ecosystem
        description: >-
          Over 3,000 built-in modules covering cloud providers, network
          devices, databases, containers, storage, and operating system tasks.
      - name: Collection System
        description: >-
          The Ansible Collections packaging format bundles related modules,
          roles, plugins, and documentation for modular content distribution.
      - name: Dynamic Inventory
        description: >-
          Query cloud providers, CMDBs, and external systems dynamically to
          build host inventories at execution time rather than static files.
  - type: UseCases
    data:
      - name: Configuration Management
        description: >-
          Ensure servers and services remain in a consistent desired state
          by applying configuration playbooks across fleets of hosts.
      - name: Application Deployment
        description: >-
          Deploy and update applications across development, staging, and
          production environments with zero-downtime rolling strategies.
      - name: Cloud Provisioning
        description: >-
          Provision cloud resources on AWS, Azure, GCP, and other providers
          using cloud-specific Ansible modules and dynamic inventory.
      - name: Network Automation
        description: >-
          Configure routers, switches, and firewalls from Cisco, Juniper,
          Arista, and Palo Alto using vendor-specific Ansible collections.
      - name: Security and Compliance
        description: >-
          Enforce security baselines, CIS benchmarks, and STIG compliance
          across infrastructure using Ansible hardening playbooks.
  - type: Integrations
    data:
      - name: Red Hat Enterprise Linux
        description: >-
          Ansible is the primary configuration management tool for Red Hat
          Enterprise Linux systems with deep integration into the RHEL platform.
      - name: Kubernetes / OpenShift
        description: >-
          Manage Kubernetes clusters, namespaces, deployments, and OpenShift
          workloads using the kubernetes.core collection.
      - name: Terraform
        description: >-
          Combine Terraform for cloud resource provisioning with Ansible for
          post-provisioning OS and application configuration.
      - name: Jenkins / GitHub Actions
        description: >-
          Integrate Ansible playbook execution into CI/CD pipelines using
          the AAP Action for GitHub or Ansible Tower Plugin for Jenkins.
      - name: ServiceNow
        description: >-
          Trigger Ansible automation from ServiceNow ITSM workflows using
          the ServiceNow ITX collection for change management automation.
