      - type: GettingStarted
        url: https://docs.ansible.com/automation-controller/latest/html/quickstart/
    contact:
      - FN: Ansible Support
        url: https://access.redhat.com/support

  - name: AWX API
    description: >-
      AWX is the open-source upstream project for Ansible Automation Platform,
      providing a web-based UI, REST API, and task engine for Ansible under the
      Apache 2.0 license. The AWX API mirrors the AAP API surface for job
      management, inventory, credentials, workflow templates, and scheduling.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/ansible/awx
