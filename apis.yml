apis:
  - name: Ansible Automation Platform API
    description: >-
      RESTful API for Ansible Automation Platform (formerly Ansible Tower) that
      provides programmatic access to job templates, inventories, credentials,
      workflow templates, schedules, notifications, and job execution. Supports
      OAuth2 authentication and delivers a comprehensive management interface
      for enterprise-scale Ansible deployments.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://docs.ansible.com/automation-controller/latest/html/controllerapi/
    baseURL: https://your-controller-host/api/v2/
    tags:
      - Ansible
      - Automation
      - Enterprise
      - Inventories
      - Jobs
      - Red Hat
      - Workflows
    properties:
      - type: Documentation
        url: https://docs.ansible.com/automation-controller/latest/html/controllerapi/
      - type: APIReference
        url: https://docs.ansible.com/automation-controller/latest/html/controllerapi/api_ref.html
      - type: Authentication
